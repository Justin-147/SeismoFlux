      dataclass_floating_values_use_python_float64_hex: true
      root_seed_exact: 147
      optimizer_seed_protocol_version_exact: 0.2.1
    objective_closure_binding_sha256:
      fields_exact: [objective_code_object_sha256, freevars_exact, bounds_payload_sha256, prepared_objective_payload_sha256, bounds_is_same_fit_argument_object]
      freevars_exact: [bounds, prepared]
    jac_closure_binding_sha256:
      fields_exact: [gradient_code_object_sha256, freevars_exact, bounds_payload_sha256, optimizer_options_payload_sha256, objective_closure_binding_sha256, objective_is_same_object]
      freevars_exact: [bounds, effective_options, objective]
    raw_OptimizeResult_canonical_sha256:
      receipt_payload_field_name: raw_OptimizeResult_canonical_payload
      receipt_must_embed_complete_payload_and_separate_recomputable_sha256: true
      exact_keys_required: [fun, hess_inv, jac, message, nfev, nit, njev, status, success, x]
      extra_missing_or_duplicate_key_action: invalid_execution
      numeric_scalar_wrapper_fields_exact: [value_hex_or_null, numeric_state, original_nonfinite_kind_or_null]
      numeric_state_values_exact: [finite, nonfinite, absent_null]
      numeric_state_contract:
        finite: {value_hex_or_null: required, original_nonfinite_kind_or_null: null}
        nonfinite: {value_hex_or_null: null, original_nonfinite_kind_or_null: required}
        absent_null: {value_hex_or_null: null, original_nonfinite_kind_or_null: null}
      nullable_nonnegative_integer_wrapper_fields_exact: [value_or_null, state]
      nullable_nonnegative_integer_state_contract:
        present: strict_nonnegative_base10_integer
        absent_null: null
      original_nonfinite_kind_values_exact: [positive_infinity, negative_infinity, nan]
      scalar_fields: {fun: numeric_scalar_wrapper, message: unicode_NFC_string, nfev: strict_nonnegative_integer, nit: strict_nonnegative_integer, njev: nullable_nonnegative_integer_wrapper, status: strict_base10_integer, success: strict_boolean}
      vector_fields: {x: numeric_vector_wrapper, jac: numeric_vector_wrapper}
      vector_shapes_if_present_exact: {x: [5], jac: [5]}
      present_vector_runtime_type_dtype_layout_exact: {type: numpy.ndarray, dtype: float64, C_contiguous: true}
      vector_field_wrapper_fields_exact: [dtype_or_null, shape_or_null, values_or_null, field_state]
      vector_field_state_values_exact: [present, present_null]
      present_vector_requires_float64_dtype_exact_shape_and_C_order_element_wrappers: true
      present_null_vector_requires_null_dtype_shape_and_values: true
      vector_element_wrappers_use_numeric_scalar_schema_and_may_not_use_absent_null: true
      hess_inv_required_type: scipy.optimize._lbfgsb_py.LbfgsInvHessProduct
      hess_inv_fields_exact: [dtype, shape, sk, yk, n_corrs, rho]
      hess_inv_array_encoding: dtype_shape_C_order_numeric_scalar_element_wrappers
      hess_inv_array_element_wrappers_may_use_only_finite_or_nonfinite_never_absent_null: true
      hess_inv_field_schemas:
        dtype: numpy_dtype_str_exact_little_endian_float64
        shape: strict_integer_pair_exact_5_5
        sk: C_order_matrix_shape_n_corrs_by_5_with_wrapped_float64_hex_values
        yk: C_order_matrix_shape_n_corrs_by_5_with_wrapped_float64_hex_values
        n_corrs: strict_nonnegative_integer_lte_10
        rho: C_order_vector_length_n_corrs_with_wrapped_float64_hex_values
      hess_inv_shape_n_corrs_and_array_dimensions_must_be_mutually_consistent: true
      normally_returned_nonfinite_numeric_field_action: preserve_null_plus_exact_field_status_and_classify_by_frozen_postprocess_failure_branch
      missing_key_unexpected_type_or_noncanonical_value_action: invalid_execution
      payload_sha256_formula: sha256_seismoflux_canonical_json_v1_of_complete_raw_OptimizeResult_canonical_payload
    fit_start_result_projection_and_diagnostic_crosswalk:
      initial_transformed: exact_start_manifest_vector
      branch_values: [successful_frozen_postprocess, frozen_postprocess_numerical_failure]
      successful_frozen_postprocess:
        final_transformed: raw_OptimizeResult_x_bitwise_equal
        objective: frozen_objective_recomputed_at_final_and_bitwise_equal_raw_OptimizeResult_fun

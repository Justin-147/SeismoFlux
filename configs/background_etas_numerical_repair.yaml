      identity_fields_exact_ref: optimizer_invocation_receipt_protocol.fit_etas_call_closing_receipt_identity_fields_exact
      fields_must_equal_closing_receipt_fields_excluding_own_sha256: true
    fit_attempt_snapshot_sha256:
      local_generation_cardinality: zero_to_five_completed_snapshot_attempts_retained_append_only_on_invalid_execution

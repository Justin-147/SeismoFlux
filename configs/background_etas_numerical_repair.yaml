      identity_fields_exact_ref: optimizer_invocation_receipt_protocol.fit_etas_call_opening_receipt_identity_fields_exact
      fields_must_equal_opening_receipt_fields_excluding_own_sha256: true
    optimizer_invocation_receipt_sha256:

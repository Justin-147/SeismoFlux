    - terminal_physical_decode_invalid
    - objective_missing_or_nonfinite
    - gradient_missing_or_nonfinite
    - gradient_threshold_exceeded
  start_failure_code_first_match_precedence:
    - terminal_vector_missing_or_nonfinite
    - terminal_physical_decode_invalid
    - objective_missing_or_nonfinite
    - gradient_missing_or_nonfinite
    - scipy_not_success
    - gradient_threshold_exceeded
  exactly_one_first_matching_failure_code_or_null_required_per_row: true
  any_unlisted_failure_code_invalidates_attempt: true
  every_row_must_bind_one_actual_started_and_completed_optimizer_invocation: true
  diagnostic_row_sha256_formula: sha256_seismoflux_canonical_json_v1_of_row_without_diagnostic_row_sha256

optimizer_invocation_receipt_protocol:
  exact_fit_call_count: 5
  exact_optimizer_invocation_count: 25
  exact_fit_call_key: snapshot_id
  exact_optimizer_invocation_key: [snapshot_id, start_index]
  fit_call_order: snapshot_order
  optimizer_invocation_order: snapshot_order_then_start_index_ascending
  prepared_objective_payload:

adapter_contract:
  implementation_may_begin_only_after_etas_qualification_evaluable_and_frozen: true
  file_io_allowed: false
  typed_interfaces:
    ETASKnownParentEvent:
      fields: [physical_event_id, origin_time_utc, available_time_utc, x_y_hex, magnitude_hex, inside_supported_domain, inside_study_area, inside_parent_domain, parent_role]
      field_types:
        physical_event_id: nonempty_unicode_NFC_string
        origin_time_utc: canonical_RFC3339_UTC_instant_with_Z
        available_time_utc: canonical_RFC3339_UTC_instant_with_Z
        x_y_hex: exact_length_two_finite_python_float64_hex_strings
        magnitude_hex: finite_python_float64_hex_string
        inside_supported_domain: strict_boolean
        inside_study_area: strict_boolean
        inside_parent_domain: strict_boolean
        parent_role: enum_supported_true_external_buffer_unsupported_conditional
      parent_role_values: [supported, true_external_buffer, unsupported_conditional]
      parent_role_domain_truth_table:
        supported: {inside_supported_domain: true, inside_study_area: true, inside_parent_domain: true}
        true_external_buffer: {inside_supported_domain: false, inside_study_area: false, inside_parent_domain: true}
        unsupported_conditional: {inside_supported_domain: false, inside_study_area: true, inside_parent_domain: true}
      available_time_must_be_gte_origin_time: true
      magnitude_range_inclusive: [4.0, 9.5]
      ordered_collection_physical_event_id_unique_and_duplicate_rejected: true
      ordered_collection_exact_order: origin_time_utc_then_physical_event_id
      missing_extra_unknown_or_alias_field_rejected: true
      field_aliases_allowed: false
      exact_order: origin_time_utc_then_physical_event_id
    ETASRetrospectiveWindow:
      fields: [window_start_utc, window_end_utc]
      field_types: {window_start_utc: canonical_RFC3339_UTC_instant_with_Z, window_end_utc: canonical_RFC3339_UTC_instant_with_Z}
      window_start_must_be_strictly_before_window_end: true
      interval_semantics: '(window_start_utc,window_end_utc]'
      missing_extra_alias_duplicate_or_unknown_field_rejected: true
    ETASRetrospectiveTargetEvent:
      fields: [physical_event_id, origin_time_utc, available_time_utc, x_y_hex, magnitude_hex, magnitude_bin, frozen_25km_grid_id, frozen_25km_cell_id, frozen_25km_row, frozen_25km_column, event_query_node_id]
      field_types:
        physical_event_id: nonempty_unicode_NFC_string
        origin_time_utc: canonical_RFC3339_UTC_instant_with_Z
        available_time_utc: canonical_RFC3339_UTC_instant_with_Z
        x_y_hex: exact_length_two_finite_python_float64_hex_strings
        magnitude_hex: finite_python_float64_hex_string
        magnitude_bin: enum_M5_6_or_M6_plus
        frozen_25km_grid_id: exact_frozen_stage4_25km_grid_id
        frozen_25km_cell_id: nonempty_unicode_NFC_string
        frozen_25km_row: strict_nonnegative_integer
        frozen_25km_column: strict_nonnegative_integer
        event_query_node_id: nonempty_unicode_NFC_string
      available_time_must_be_gte_origin_time: true
      magnitude_bin_rule: M5_6_for_5_lte_M_lt_6_else_M6_plus_for_6_lte_M_lte_9_5
      target_magnitude_below_5_or_above_9_5_rejected: true
      target_to_cell_mapping: exact_covers_then_row_column_cell_id_tie_break_from_frozen_stage4_R2_25km_grid
      exact_coordinates_used_only_for_frozen_cell_mapping_and_never_for_query_refinement_or_point_intensity: true
      ordered_collection_physical_event_id_and_event_query_node_id_unique: true
      duplicate_missing_or_permuted_target_rejected: true
      exact_order: origin_time_utc_then_physical_event_id
      missing_extra_unknown_or_alias_field_rejected: true
    ETASRetrospectiveEventQueryNode:
      fields: [event_query_node_id, physical_event_id, frozen_25km_grid_id, frozen_25km_cell_id, frozen_25km_row, frozen_25km_column, cell_center_x_y_hex, event_time_utc, magnitude_bin]
      field_types: {event_query_node_id: nonempty_unicode_NFC_string, physical_event_id: nonempty_unicode_NFC_string, frozen_25km_grid_id: exact_frozen_stage4_25km_grid_id, frozen_25km_cell_id: nonempty_unicode_NFC_string, frozen_25km_row: strict_nonnegative_integer, frozen_25km_column: strict_nonnegative_integer, cell_center_x_y_hex: exact_length_two_finite_python_float64_hex_strings, event_time_utc: canonical_RFC3339_UTC_instant_with_Z, magnitude_bin: enum_M5_6_or_M6_plus}
      exact_one_to_one_order_with_ordered_targets: true
      target_query_node_crosswalk_fields_exact:
        - target.event_query_node_id_equals_node.event_query_node_id
        - target.physical_event_id_equals_node.physical_event_id
        - target.frozen_25km_grid_id_equals_node.frozen_25km_grid_id
        - target.frozen_25km_cell_id_equals_node.frozen_25km_cell_id
        - target.frozen_25km_row_equals_node.frozen_25km_row
        - target.frozen_25km_column_equals_node.frozen_25km_column

    exact_first_to_last_gate_order: [insufficient_converged_starts, converged_gradient_threshold_exceeded, best_three_objective_spread_exceeded, best_three_parameter_spread_exceeded, hessian_invalid_or_minimum_eigenvalue_failed, hessian_condition_number_exceeded, branching_ratio_gate_failed, grid_25_to_12_5_expected_count_difference_exceeded, grid_25_to_12_5_density_l1_exceeded]
    append_each_failed_gate_once_in_exact_order: true
    gate_dependency_and_status_truth_table:
      ordered_gate_names_exact: [minimum_converged_starts, converged_gradient, best_three_objective_spread, best_three_parameter_spread, hessian_minimum_eigenvalue, hessian_condition_number, branching_ratio, grid_25_to_12_5_expected_count_difference, grid_25_to_12_5_density_l1]
      gate_status_values_exact: [passed, failed, not_run_upstream_gate]
      minimum_converged_starts: {prerequisites: [], evaluation: always_from_converged_start_count, failure_code: insufficient_converged_starts}
      converged_gradient: {prerequisites: [minimum_converged_starts_passed], evaluation: maximum_of_all_stability_eligible_gradient_infinity_norms, failure_code: converged_gradient_threshold_exceeded}
      best_three_objective_spread: {prerequisites: [minimum_converged_starts_passed, converged_gradient_passed], evaluation_group: best_three_spread_siblings, failure_code: best_three_objective_spread_exceeded}
      best_three_parameter_spread: {prerequisites: [minimum_converged_starts_passed, converged_gradient_passed], evaluation_group: best_three_spread_siblings, failure_code: best_three_parameter_spread_exceeded}
      hessian_minimum_eigenvalue: {prerequisites: [both_best_three_spread_siblings_passed], evaluation: execute_or_use_same_qualification_hessian_once, failure_code: hessian_invalid_or_minimum_eigenvalue_failed}
      hessian_condition_number: {prerequisites: [hessian_minimum_eigenvalue_passed], evaluation: same_successful_finite_positive_qualification_hessian, failure_code: hessian_condition_number_exceeded}
      branching_ratio: {prerequisites: [hessian_condition_number_passed, selected_start_nonnull], evaluation: frozen_ETASModelSpec_branching_ratio_of_same_selected_parameters, failure_code: branching_ratio_gate_failed}
      grid_25_to_12_5_expected_count_difference: {prerequisites: [branching_ratio_passed], evaluation_group: three_grid_metric_siblings, failure_code: grid_25_to_12_5_expected_count_difference_exceeded}
      grid_25_to_12_5_density_l1: {prerequisites: [branching_ratio_passed], evaluation_group: three_grid_metric_siblings, failure_code: grid_25_to_12_5_density_l1_exceeded}
      sibling_group_rule: once_all_shared_prerequisites_pass_both_sibling_metrics_are_evaluated_and_each_status_and_failure_code_is_derived_independently
      downstream_rule: any_failed_or_not_run_prerequisite_makes_each_dependent_gate_not_run_upstream_gate_with_null_gate_metric_and_no_failure_code
      hessian_failure_rule: invalid_absent_nonfinite_or_below_minimum_fails_only_hessian_minimum_eigenvalue_and_skips_condition_and_all_downstream_gates
      ordered_gate_status_records_must_contain_every_ordered_gate_once_in_exact_order: true
      ordered_failure_codes_must_equal_exact_order_projection_of_gate_status_failed_to_declared_failure_code: true
    prerequisite_skip_and_failure_code_semantics:
      fewer_than_minimum_stability_eligible_starts: count_failed_and_every_downstream_gate_not_run_upstream_gate_with_null_snapshot_gate_metric
      best_three_metrics_in_closing_stability_payload_when_count_or_gradient_gate_failed: retained_only_in_closing_diagnostic_payload_but_snapshot_gate_metrics_are_null_and_both_spread_gates_are_not_run_upstream_gate
      hessian_metrics_absent_because_any_count_gradient_or_spread_prerequisite_failed: both_hessian_snapshot_gate_metrics_null_and_hessian_minimum_and_condition_gates_not_run_upstream_gate
      hessian_attempted_but_nonfinite_invalid_or_below_minimum: append_hessian_invalid_or_minimum_eigenvalue_failed_once
      hessian_finite_positive_but_condition_number_above_maximum: append_hessian_condition_number_exceeded_once
      branching_ratio_absent_because_any_hessian_prerequisite_failed_or_selected_start_is_null: skipped_null_and_do_not_append_branching_ratio_gate_failed
      three_grid_evidence_absent_because_any_required_upstream_stability_or_branching_gate_failed: both_grid_gates_skipped_all_grid_metrics_null_and_do_not_append_either_grid_failure_code
      numerical_status_when_any_downstream_gate_is_skipped: not_evaluable_from_the_actual_recorded_upstream_failure_codes_only
      skipped_gate_status_value_exact: not_run_upstream_gate
    duplicate_or_out_of_order_failure_code_action: invalid_execution
  invalid_execution_may_not_publish_qualification_manifest_or_result_tag: true
  implementation_exception_may_not_be_reclassified_as_numerical_negative: true


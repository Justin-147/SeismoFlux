      completed_receipt_list_cardinalities:
        ordered_completed_fit_call_opening_receipt_sha256: zero_to_five
        ordered_completed_optimizer_invocation_receipt_sha256: zero_to_twenty_five
        ordered_completed_fit_call_closing_receipt_sha256: zero_to_five
        ordered_completed_fit_attempt_snapshot_sha256: zero_to_five
        ordered_completed_diagnostic_row_sha256: zero_to_twenty_five
        ordered_optimizer_call_observation_log: zero_to_twenty_five
      incomplete_wrapper_observation_directory: data/processed/stage2R/etas_numerical_repair_fit_input/attempts/{attempt_id}/incomplete_optimizer_observations
      incomplete_wrapper_observation_path_template: data/processed/stage2R/etas_numerical_repair_fit_input/attempts/{attempt_id}/incomplete_optimizer_observations/{global_invocation_index}.json
      incomplete_wrapper_observation_classification: local_restricted_gitignored_append_only
      incomplete_wrapper_observation_fields_exact: [attempt_id, snapshot_id, start_index, global_invocation_index, failure_phase, exception_type_or_null, safe_failure_evidence_kind, safe_failure_evidence_payload_or_null, safe_failure_evidence_sha256_or_null, observation_sha256]
      incomplete_wrapper_failure_phase_values_exact: [predelegation_validation_failed, original_minimize_raised, returned_payload_schema_failed, return_identity_or_mutation_check_failed, fit_etas_raised_after_optimizer_return_before_returned_result_crosswalk, returned_start_result_crosswalk_failed]
      safe_failure_evidence_kind_values_exact: [none, complete_raw_OptimizeResult, raw_schema_failure_type_state_projection]
      safe_failure_evidence_phase_contract:
        predelegation_validation_failed: {allowed_kinds: [none], payload: null, sha256: null}
        original_minimize_raised: {allowed_kinds: [none], payload: null, sha256: null}
        returned_payload_schema_failed: {allowed_kinds: [raw_schema_failure_type_state_projection], payload: required, sha256: required}
        return_identity_or_mutation_check_failed: {allowed_kinds: [complete_raw_OptimizeResult, raw_schema_failure_type_state_projection], payload: required, sha256: required}
        fit_etas_raised_after_optimizer_return_before_returned_result_crosswalk: {allowed_kinds: [complete_raw_OptimizeResult], payload: required, sha256: required}
        returned_start_result_crosswalk_failed: {allowed_kinds: [complete_raw_OptimizeResult], payload: required, sha256: required}
      complete_raw_OptimizeResult_payload_schema_ref: optimizer_invocation_receipt_protocol.canonical_subpayload_schemas.raw_OptimizeResult_canonical_sha256
      raw_schema_failure_type_state_projection_fields_exact: [runtime_type_module, runtime_type_qualified_name, observed_key_names_or_null, observed_value_type_by_key_or_null, normalization_failure_code]
      raw_schema_failure_projection_forbids_repr_memory_address_absolute_path_event_target_score_or_secret: true
      safe_failure_evidence_sha256_formula: sha256_seismoflux_canonical_json_v1_of_complete_safe_failure_evidence_payload
      downstream_crosswalk_failure_phase_contract:
        fit_etas_raised_after_optimizer_return_before_returned_result_crosswalk: every_normally_returned_optimizer_call_without_a_returned_start_result_crosswalk_is_failed_and_complete_raw_OptimizeResult_evidence_is_required
        returned_start_result_crosswalk_failed: matching_normally_returned_optimizer_call_is_failed_and_complete_raw_OptimizeResult_evidence_is_required
      evidence_layer_may_not_reimplement_fit_postprocessing_or_fabricate_completed_invocation_receipt_after_fit_failure: true
      optimizer_call_observation_record_fields_exact: [snapshot_id, start_index, global_invocation_index, status, completed_optimizer_invocation_receipt_sha256_or_null, incomplete_wrapper_observation_sha256_or_null]
      optimizer_call_observation_status_values_exact: [completed_valid, failed]
      optimizer_call_observation_xor_receipt_or_failure_sha_required_by_status: true
      ordered_optimizer_call_observation_log_must_cover_every_actual_started_call_exactly_once: true
      ordered_completed_optimizer_invocation_receipt_sha256_must_equal_completed_valid_projection_of_observation_log: true
      every_failed_observation_sha256_must_resolve_to_exactly_one_canonical_observation_file_with_matching_recomputed_preimage: true
      observation_file_set_must_equal_failed_projection_of_observation_log_with_no_missing_extra_or_overwrite: true
      incomplete_observation_files_must_be_retained_with_failure_receipt_and_may_not_be_deleted_on_retry: true
      observation_log_order: snapshot_order_then_start_index_ascending
      event_rows_coordinates_targets_or_scores_allowed: false
      canonical_sha256_without_own_field_required: true
      public_materialization_or_result_tag_allowed: false

content_addressing:
  algorithm: sha256_seismoflux_canonical_json_v1
  mapping_keys: unicode_NFC_strings_sorted_by_codepoint
  string_values: unicode_NFC
  integers: base10_no_leading_zero
  floats: finite_only_python_float_hex_typed_objects
  mapping_separators: comma_and_colon_without_whitespace
  encoding: utf8_without_bom_or_trailing_newline
  nonfinite_action: reject
  identities:
    optimizer_runtime_code_seal_sha256:
      existence: exactly_one_per_started_execution_attempt_that_reaches_runtime_preflight
      publication: local_until_evaluable_or_not_evaluable_protocol_valid_result

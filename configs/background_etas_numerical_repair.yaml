    canonical_hash_required_by_transparent_wrapper_before_first_original_scipy_minimize_delegation: true
    includes_every_dataclass_field_and_full_ordered_array_value_shape_dtype_and_float64_hex: true
    must_be_derivable_only_from_matching_scientific_fit_input_sha256: true
    all_five_optimizer_receipts_and_fit_call_closing_receipt_must_bind_same_payload_sha256: true
    objective_closure_prepared_object_must_hash_to_same_payload_sha256: true
  canonical_subpayload_schemas:
    python_code_object_sha256:
      fields_exact: [python_implementation_version_and_abi, co_name, co_qualname, co_argcount, co_posonlyargcount, co_kwonlyargcount, co_nlocals, co_stacksize, co_flags, co_code_hex, co_consts, co_names, co_varnames, co_freevars, co_cellvars, co_exceptiontable_hex]
      constant_types_and_encoding: [null, strict_boolean, base10_integer, unicode_NFC_string, bytes_lowercase_hex, finite_python_float64_hex, ordered_tuple_recursive, frozenset_recursive_sorted_by_canonical_element_bytes, nested_code_object_sha256]
      co_filename_firstlineno_linetable_and_host_path_excluded: true
      unknown_constant_type_action: invalid_execution
    callable_source_and_signature_identity_sha256:
      fields_exact: [distribution_or_project_module_identity, module_relative_path, module_file_sha256, qualified_name, ast_sha256, exact_UTF8_source_slice_sha256, canonical_signature]
      source_slice_rule: ast_lineno_end_lineno_exact_bytes_from_verified_module_file
      canonical_signature_parameter_fields: [position, name, kind, default_type_and_canonical_value_or_required, annotation_qualified_name_or_null]

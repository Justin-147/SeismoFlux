      absolute_path_or_repr_with_memory_address_forbidden: true
    exact_fit_arguments_sha256:
      fields_exact: [scientific_fit_input_sha256, ETASLikelihoodProblem_payload_sha256, ETASModelSpec_payload, root_seed, optimizer_seed_protocol_version, model_id, ETASParameterBounds_payload, OptimizerOptions_payload, StabilityThresholds_payload]

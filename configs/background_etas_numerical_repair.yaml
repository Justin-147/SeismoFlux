    - physical_parameters_hex_or_null
    - active_bound_flags
  required_fields_are_exact_and_any_extra_alias_duplicate_or_unknown_field_is_forbidden: true
  nonfinite_serialization: null_plus_explicit_failure_code
  missing_failed_start_row_action: invalidate_attempt_without_qualification_result
  aggregate_only_stability_without_rows_forbidden: true
  valid_start_failure_codes:

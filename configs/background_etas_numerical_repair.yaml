etas_model:
  variant_id: etas/d25_q1.5_gamma1_cut300_kde_bw75
  background_kde_bandwidth_km: 75.0
  maximum_magnitude: 9.5
  spatial_kernel: {d_km2: 25.0, q: 1.5, gamma: 1.0, cutoff_km: 300.0}
  temporal_kernel: {history_parent_cutoff_days: 3650.0, form: normalized_infinite_support_omori_utsu}
  branching_ratio_maximum: 0.95
  parameter_order: [background_rate_per_day, productivity_k, alpha, c_days, p]
  transformed_parameter_order: [log_background_rate_per_day, log_productivity_k, log_alpha, log_c_days, log_p_minus_one]
  parameter_bounds:
    background_rate_per_day: [0.01, 10.0]
    productivity_k: [0.0001, 0.5]
    alpha: [0.05, 2.0]
    c_days: [0.001, 30.0]
    p: [1.01, 2.5]

repair:
  defect: exp_log_physical_upper_may_decode_one_ulp_above_exact_bound
  affected_upper_bounds:
    background_rate_per_day:
      exact: '0x1.4000000000000p+3'
      old_decoded: '0x1.4000000000001p+3'
    c_days:
      exact: '0x1.e000000000000p+4'
      old_decoded: '0x1.e000000000001p+4'
  allowed_implementation:
    - reject_nonfinite_and_transformed_coordinates_outside_exact_closed_transformed_bounds
    - derive_exact_transformed_endpoints_via_unchanged_self_transformed_method
    - exponentiate_finite_in_domain_coordinates
    - exact_transformed_endpoint_maps_to_exact_corresponding_physical_endpoint
    - retain_final_strict_physical_contains_check
  forbidden_implementation:
    - widen_physical_bounds
    - tolerance_based_contains
    - clip_out_of_domain_transformed_coordinates
    - move_transformed_bounds_inward
    - nextafter_expand_physical_domain
  required_regressions:
    - all_five_physical_lower_and_upper_endpoints_round_trip_exactly
    - one_ulp_outside_every_transformed_endpoint_is_rejected
    - objectives_at_mu_10_and_c_30_are_finite_when_other_parameters_are_valid
    - interior_parameter_decoding_is_bitwise_unchanged

randomness:
  root_seed: 147
  bit_generator: numpy.random.PCG64
  seed_protocol_version: 0.2.1
  repair_protocol_version_may_not_enter_optimizer_seed_derivation: true
  start_indices: [0, 1, 2, 3, 4]
  start_count_per_snapshot: 5
  exact_start_manifest_required: true
  regenerated_start_vectors_must_match_hex_exactly: true

optimizer:
  method: scipy_lbfgsb_float64
  maximum_iterations: 500
  ftol: 1.0e-12
  gtol: 1.0e-6
  maxfun: 100000
  maxls: 20
  gradient: numerical_three_point_relative_step_1e_6
  retry_with_new_seed_allowed: false
  alternate_optimizer_allowed: false

diagnostics:
  public_path: data/manifests/etas_numerical_repair_qualification.json
  primary_record_count: 25
  exact_row_key: [snapshot_id, start_index]
  exact_snapshot_and_start_cartesian_product_required: true
  row_order: snapshot_order_then_start_index_ascending
  required_fields:
    - attempt_id
    - snapshot_id
    - model_id
    - start_index
    - initial_transformed_hex
    - initial_vector_sha256
    - terminal_transformed_hex_or_null
    - terminal_source
    - objective_hex_or_null
    - raw_scipy_success

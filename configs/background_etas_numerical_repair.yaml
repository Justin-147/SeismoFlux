      fields_must_equal_optimizer_runtime_code_seal_fields_excluding_own_sha256: true
      derived_hash_preimage_crosswalk_ref: qualification_execution_seal.optimizer_runtime_code_seal.code_tag_baseline_equality.exact_full_object_and_sibling_hash_crosswalks
      every_derived_hash_must_recompute_from_the_sibling_full_object_before_optimizer_runtime_code_seal_sha256_is_computed: true
    fit_etas_call_opening_receipt_sha256:
      local_generation_cardinality: zero_to_five_completed_snapshot_opening_receipts_retained_append_only_on_invalid_execution
      public_result_cardinality: exactly_five_only_for_complete_protocol_valid_evaluable_or_not_evaluable_result

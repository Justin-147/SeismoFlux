schema_version: 1
protocol_version: 0.3.0
stage: 3
execution_mode: feature_only_no_target_scoring
status: preregistered_before_stage3_feature_execution
frozen_on: '2026-07-15'
freeze_tag: v0.3.0-anomaly-feature-protocol
blueprint: SEISMOFLUX_IMPLEMENTATION_HANDOFF.md

authorization:

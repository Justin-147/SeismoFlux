    expected_path: data/processed/stage1/debc98054172a4a1/anomaly_observation.parquet
    expected_row_count: 59904
    expected_file_sha256: a4837a6a865ca0d4939fd45d8d8e9c3e4fd90cf0a78e9bb07d57335d5743b80c
